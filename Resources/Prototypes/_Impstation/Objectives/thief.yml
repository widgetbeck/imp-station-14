# gimmick

- type: entity
  parent: BaseGimmickObjective
  id: ThiefDieObjective
  name: Die a glorious death.
  description: Die. This objective is not tracked and will automatically succeed, so just have fun with it!
  components:
  - type: Objective
    difficulty: 1.5
    icon:
      sprite: Mobs/Ghosts/ghost_human.rsi
      state: icon
    trivial: true
  - type: AutoCompleteCondition
  - type: ObjectiveBlacklistRequirement
    blacklist:
      components:
      - AutoCompleteCondition

